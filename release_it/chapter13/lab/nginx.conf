# nginx.conf
# Simple reverse proxy configuration for chaos experiment

events {
    worker_connections 1024;
}

http {
    # Upstream backend service
    upstream backend {
        server backend-service:6379;
    }

    server {
        listen 80;
        server_name localhost;

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "OK";
        }

        # Proxy to backend (simulated with static response)
        location / {
            # In real system: proxy_pass http://backend;
            # For demo: return static response
            return 200 '{"status":"ok","service":"api-gateway","timestamp":"$time_iso8601"}';
            add_header Content-Type application/json;
        }

        # Endpoint that depends on backend
        location /api/data {
            # Simulates dependency on backend service
            # In chaos: backend failure should cause this to fail
            return 200 '{"data":["item1","item2","item3"],"source":"backend"}';
            add_header Content-Type application/json;
        }
    }
}
